
# 인코딩: UTF-8 설정 필수
# =============================================

# 1. 내장 WAS 포트 번호 변경 가능, 기본값 8080
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/our_assembly
    username: root
    password: 비밀번호

  jpa:
    hibernate:
      # update: 기존 테이블 유지하면서 변경사항 반영
      # create: 매번 테이블 새로 생성 (데이터 날아감 주의!)
      ddl-auto: update
    # 실행되는 SQL 콘솔에 출력
    show-sql: true
    properties:
      hibernate:
        # SQL 보기 좋게 포맷팅
        format_sql: true
    # 2-7. 데이터 초기화 시 JPA가 먼저 실행된 후 SQL 실행
    defer-datasource-initialization: true

  sql:
    init:
      # 2-5. 프로젝트 시작 시 SQL 자동 실행
      # always: 항상 실행 / never: 실행 안 함
      mode: always
      # classpath: resources 폴더 기준
      # data-locations: classpath:/sql/data.sql

# SQL 파라미터 값 로그에 출력
logging:
  level:
    # ? 대신 실제 값 출력
    org.hibernate.jdbc.bind: TRACE
    org.hibernate.sql: DEBUG